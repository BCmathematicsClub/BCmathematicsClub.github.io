<!doctype html>
<html>
  
<head>
  <meta charset="utf-8">
  <title>Club Access — Login</title>
  <link rel="stylesheet" href="/assets/css/style.css">
</head>
  
<body>
  <main>
    <h1>Restricted Access</h1>
    <div id="step-password">
      <label>Password: <input id="pwd" type="password"></label>
      <button id="sendCode">Submit</button>
      <p id="pwdMsg"></p>
    </div>

    <div id="step-2fa" style="display:none">
      <label>Enter code sent to club email: <input id="code" type="text"></label>
      <button id="verify">Verify</button>
      <p id="codeMsg"></p>
    </div>
  </main>

  <script src="/js/auth.js"></script>
</body>
  
</html>
